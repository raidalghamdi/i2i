<app-page-header title="Settings" i18n-title="@@settingsPageTitle" />

@if (loading()) {
  <app-loading-state variant="skeleton" [rows]="4" label="Loading settings…" i18n-label="@@userSettingsLoading" />
} @else if (error(); as e) {
  <app-error-state [message]="e" (retry)="reload()" />
} @else if (profile(); as p) {
  <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
    <section class="card-surface card-body">
      <h2 class="section-title" i18n="@@settingsProfileHeading">Profile</h2>
      <div class="mt-3 flex flex-col gap-3">
        <div>
          <label class="field-label" i18n="@@settingsFullName">Full name</label>
          <p class="mt-1 text-sm text-foreground">{{ p.fullNameEn }}</p>
        </div>
        <div>
          <label class="field-label" i18n="@@settingsEmail">Email</label>
          <p class="mt-1 text-sm text-foreground" dir="ltr">{{ p.email }}</p>
        </div>
        <div>
          <label class="field-label" i18n="@@settingsRole">Role</label>
          <p class="mt-1 text-sm text-foreground">{{ p.roles.join(', ') }}</p>
        </div>
      </div>
    </section>

    <section class="card-surface card-body">
      <h2 class="section-title" i18n="@@settingsLanguageHeading">Language</h2>
      <p class="mt-1 text-sm text-muted-foreground" i18n="@@settingsLanguagePref">Switch the display language.</p>
      <a [href]="alternateLocaleHref()" class="btn-outline btn-sm mt-3 inline-block" i18n="@@settingsSwitchLanguage">Switch language</a>
    </section>
  </div>
}
