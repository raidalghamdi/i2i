<section class="rounded-2xl bg-gradient-to-br from-[#12333c] via-[#1C4854] to-[#0d2831] p-6 text-white shadow-lg sm:p-8">
  <div class="flex flex-wrap items-start justify-between gap-3">
    <div>
      <p class="text-xs font-semibold uppercase tracking-wider text-white/60">{{ code() }}</p>
      <h1 class="mt-1 text-2xl font-bold leading-tight sm:text-3xl">{{ title() }}</h1>
    </div>
    <app-status-badge [status]="status()">{{ status() }}</app-status-badge>
  </div>

  <div class="mt-3 flex flex-wrap gap-2">
    @if (activityName()) {
      <span class="rounded-full bg-white/10 px-3 py-1 text-xs font-medium text-white/85">{{ activityName() }}</span>
    }
    @if (trackName()) {
      <span class="rounded-full bg-white/10 px-3 py-1 text-xs font-medium text-white/85">{{ trackName() }}</span>
    }
    @if (challengeText()) {
      <span class="rounded-full bg-white/10 px-3 py-1 text-xs font-medium text-white/85">{{ challengeText() }}</span>
    }
  </div>

  <app-idea-journey-timeline [stages]="journey().stages" />
</section>
