<section class="card-surface card-body">
  <h2 class="section-title" i18n="@@postProgramTitle">Post-program progress</h2>
  <ol class="mt-3 flex flex-col gap-3">
    @for (step of steps(); track step.key) {
      <li class="pp-step flex items-center gap-3" [attr.aria-current]="step.state === 'current' ? 'step' : null">
        <span
          class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full text-xs font-semibold"
          [class]="step.state === 'done' ? 'bg-emerald-600 text-white'
            : step.state === 'current' ? 'bg-brand-teal text-white'
            : 'border border-border text-muted-foreground'"
          aria-hidden="true"
        >
          @if (step.state === 'done') { ✓ } @else { {{ $index + 1 }} }
        </span>
        <span
          class="text-sm"
          [class]="step.state === 'upcoming' ? 'text-muted-foreground' : 'font-medium text-foreground'"
        >{{ step.label }}</span>
      </li>
    }
  </ol>
</section>
