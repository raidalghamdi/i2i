<app-page-header title="Role Roster" i18n-title="@@rosterHubTitle" />

@if (loading()) {
  <app-loading-state variant="skeleton" [rows]="3" />
} @else if (error(); as e) {
  <app-error-state [message]="e" (retry)="reload()" />
} @else if (rows().length === 0) {
  <app-empty-state title="No roles configured yet." i18n-title="@@rosterHubEmpty" icon="users" />
} @else {
  <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
    @for (row of rows(); track row.roleCode) {
      <a [routerLink]="['/admin/roster', row.roleCode]" class="card-surface card-body flex flex-col gap-2 transition-colors hover:bg-brand-teal-light">
        <span class="section-title">{{ row.roleNameEn }}</span>
        <dl class="mt-2 grid grid-cols-2 gap-x-4 gap-y-1 text-sm">
          <dt class="text-muted-foreground" i18n="@@rosterHubActiveLabel">Active</dt>
          <dd class="text-end font-semibold text-brand-teal">{{ row.activeCount }}</dd>
          <dt class="text-muted-foreground" i18n="@@rosterHubPendingLabel">Pending</dt>
          <dd class="text-end font-semibold text-brand-teal">{{ row.pendingCount }}</dd>
          <dt class="text-muted-foreground" i18n="@@rosterHubExpiredLabel">Expired</dt>
          <dd class="text-end font-semibold text-brand-teal">{{ row.expiredCount }}</dd>
          <dt class="text-muted-foreground" i18n="@@rosterHubWithdrawnLabel">Withdrawn</dt>
          <dd class="text-end font-semibold text-brand-teal">{{ row.withdrawnCount }}</dd>
        </dl>
      </a>
    }
  </div>
}
