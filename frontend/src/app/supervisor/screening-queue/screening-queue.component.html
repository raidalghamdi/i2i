<app-page-header title="Screening Queue" i18n-title="@@screeningQueueTitle" />

@if (loading()) {
  <app-loading-state variant="skeleton" [rows]="3" />
} @else if (error(); as e) {
  <app-error-state [message]="e" (retry)="reload()" />
} @else if (queue().length === 0) {
  <app-empty-state title="There are no ideas awaiting screening." i18n-title="@@screeningQueueEmpty" icon="clipboard-check" />
} @else {
  <ul class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
    @for (item of queue(); track item.id) {
      <li class="card-surface card-body flex flex-col gap-2">
        <a [routerLink]="['/supervisor/screening', item.id]" class="flex flex-col gap-2">
          <span class="text-xs font-medium text-brand-gold">{{ item.code }} — {{ item.titleEn }}</span>
          <span class="text-sm text-muted-foreground">{{ item.submitterName }}</span>
        </a>
      </li>
    }
  </ul>
}
