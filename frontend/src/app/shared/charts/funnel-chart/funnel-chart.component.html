<div class="flex flex-col gap-3">
  @for (row of rows(); track row.label) {
    <div data-funnel-row class="flex items-center gap-3 text-sm">
      <span class="w-32 shrink-0 truncate">{{ row.label }}</span>
      <div class="h-6 flex-1 overflow-hidden rounded-md bg-muted">
        <div
          data-funnel-fill
          class="flex h-full items-center justify-end rounded-md bg-brand-teal px-2 text-xs font-semibold text-white"
          [style.width.%]="row.widthPct"
        >
          {{ row.count }}
        </div>
      </div>
    </div>
  }
</div>
