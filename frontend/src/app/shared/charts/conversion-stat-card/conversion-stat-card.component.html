<div class="card-surface card-body">
  <p class="text-4xl font-bold text-brand-teal">{{ rate() | number: '1.1-1' }}%</p>

  <div class="mt-3 h-3 w-full overflow-hidden rounded-full bg-muted">
    <div
      data-meter-fill
      class="h-full rounded-full"
      [style.width.%]="clampedRate()"
      [style.background]="'linear-gradient(90deg, #20808D 0%, #FFC553 100%)'"
    ></div>
  </div>

  <div class="mt-4 grid grid-cols-2 gap-3">
    <div data-stat-box class="rounded-lg border border-border p-3">
      <p class="text-xs text-muted-foreground" i18n="@@chartsConversionSubmitted">Submitted</p>
      <p class="mt-1 text-xl font-semibold text-foreground">{{ submitted() }}</p>
    </div>
    <div data-stat-box class="rounded-lg border border-border p-3">
      <p class="text-xs text-muted-foreground" i18n="@@chartsConversionPilot">Piloted</p>
      <p class="mt-1 text-xl font-semibold text-foreground">{{ pilot() }}</p>
    </div>
  </div>
</div>
