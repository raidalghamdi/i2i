<div class="overflow-x-auto">
  <svg [attr.width]="width()" [attr.height]="height" [attr.viewBox]="'0 0 ' + width() + ' ' + height" role="img">
    <line [attr.x1]="28" [attr.y1]="baselineY" [attr.x2]="width() - 8" [attr.y2]="baselineY" stroke="#94a3b8" stroke-width="1" opacity="0.4" />
    @for (group of groups(); track group.month) {
      @for (bar of group.bars; track bar.key) {
        <rect [attr.x]="bar.x" [attr.y]="bar.y" [attr.width]="bar.width" [attr.height]="bar.height" rx="2" [attr.fill]="bar.color" />
      }
      <text [attr.x]="group.labelX" [attr.y]="baselineY + 14" text-anchor="middle" class="text-[10px]" fill="#5C5F66">{{ group.label }}</text>
    }
  </svg>
</div>

<div class="mt-3 flex flex-wrap gap-3 text-xs">
  @for (series of legend; track series.key) {
    <span data-legend-item class="flex items-center gap-1.5">
      <span class="h-2.5 w-2.5 rounded-sm" [style.background-color]="series.color"></span>
      <span class="text-muted-foreground">{{ series.label }}</span>
    </span>
  }
</div>
