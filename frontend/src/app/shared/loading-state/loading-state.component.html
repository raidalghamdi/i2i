@if (variant() === 'skeleton') {
  <div class="w-full space-y-2 p-4" role="status">
    @for (row of skeletonRows; track row) {
      <div class="h-4 w-full animate-pulse rounded bg-muted"></div>
    }
  </div>
} @else {
  <div class="flex flex-col items-center gap-3 p-8 text-center" role="status">
    <div class="h-8 w-8 animate-spin rounded-full border-2 border-muted border-t-brand-teal"></div>
    <p class="text-sm text-muted-foreground">{{ label() ?? defaultLabel }}</p>
  </div>
}
