@if (section(); as s) {
  <header class="mb-6">
    <h1 class="page-title">{{ s.title }}</h1>
    <p class="mt-2 text-sm text-muted-foreground">{{ s.desc }}</p>
  </header>

  @if (sectionKey() === 'workshops') {
    <div class="card-surface card-body">
      <h2 class="section-title">{{ upcomingSessionsLabel }}</h2>
      <ul class="mt-3 flex flex-col gap-3">
        @for (item of workshopItems; track item.name) {
          <li class="flex flex-wrap items-center justify-between gap-2 border-b border-border pb-2 last:border-0 last:pb-0">
            <span class="text-sm font-medium text-foreground">{{ item.name }}</span>
            <span class="text-sm text-muted-foreground">{{ item.date }}</span>
          </li>
        }
      </ul>
    </div>
  }
} @else {
  <h1 class="page-title" i18n="@@eventSectionNotFoundTitle">Section not found</h1>
  <div class="card-surface card-body mt-6">
    <p class="text-sm text-foreground">{{ notFoundMessage }}</p>
    <a routerLink="/events" class="btn-link mt-3">{{ backToEventsLabel }}</a>
  </div>
}
