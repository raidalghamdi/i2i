<app-public-page-hero slug="target-audience" [defaultTitle]="pageTitle" [defaultBody]="pageBody" />

<div class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-3">
  @for (card of cards; track card.title) {
    <div class="card-surface card-body">
      <p class="section-title">{{ card.title }}</p>
      <p class="mt-2 text-sm leading-relaxed text-foreground">{{ card.body }}</p>
    </div>
  }
</div>
