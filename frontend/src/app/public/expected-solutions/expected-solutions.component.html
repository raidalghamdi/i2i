<app-public-page-hero slug="expected-solutions" [defaultTitle]="pageTitle" [defaultBody]="pageBody" />

<div class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2">
  @for (category of categories; track category.title) {
    <div class="card-surface card-body">
      <h2 class="section-title">{{ category.title }}</h2>
      <ul class="mt-3 flex flex-col gap-2">
        @for (item of category.items; track item) {
          <li class="flex items-start gap-2 text-sm text-foreground">
            <app-icon name="check-circle" size="mt-0.5 h-4 w-4" class="shrink-0 text-brand-teal" />
            <span>{{ item }}</span>
          </li>
        }
      </ul>
    </div>
  }
</div>
