<div class="mx-auto flex max-w-md flex-col gap-6 py-12">
  <div class="text-center">
    <h1 class="text-2xl font-semibold text-foreground" i18n="@@loginTitle">Sign in</h1>
    <p class="mt-1 text-sm text-muted-foreground" i18n="@@loginSubtitle">
      Sign in to access your workboard.
    </p>
  </div>

  <section class="card-surface card-body flex flex-col gap-4">
    @if (errorMessage(); as msg) {
      <div class="field-error" role="alert">{{ msg }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="field-label" for="login-email" i18n="@@loginEmailLabel">Email</label>
        <input id="login-email" class="field-input" type="email" formControlName="email" autocomplete="username" />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <span class="field-error" i18n="@@loginEmailError">Enter a valid email address.</span>
        }
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="field-label" for="login-password" i18n="@@loginPasswordLabel">Password</label>
        <input id="login-password" class="field-input" type="password" formControlName="password" autocomplete="current-password" />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <span class="field-error" i18n="@@loginPasswordError">Password is required.</span>
        }
      </div>

      <button
        type="submit"
        class="btn-default w-full"
        [disabled]="form.invalid || submitting()"
        i18n="@@loginSubmit"
      >
        Sign in
      </button>
    </form>
  </section>
</div>
