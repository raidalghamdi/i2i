<app-public-page-hero slug="roadmap" [defaultTitle]="pageTitle" [defaultBody]="pageBody" />

<div class="card-surface card-body mt-6">
  <ol class="relative flex flex-col gap-6 ps-6">
    <div class="absolute inset-y-0 start-1.5 w-px bg-border" aria-hidden="true"></div>
    @for (milestone of milestones; track milestone.phase) {
      <li class="relative">
        <span class="absolute -start-6 top-1 h-3 w-3 rounded-full border-2 border-brand-teal bg-card" aria-hidden="true"></span>
        <div class="flex flex-wrap items-center gap-2">
          <h2 class="section-title">{{ milestone.phase }}</h2>
          <span
            class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium"
            [class]="statusTone(milestone.status)"
          >{{ statusLabel(milestone.status) }}</span>
        </div>
        <p class="text-sm font-medium text-muted-foreground">{{ milestone.date }}</p>
        <p class="mt-1 text-sm leading-relaxed text-foreground">{{ milestone.desc }}</p>
      </li>
    }
  </ol>
</div>
