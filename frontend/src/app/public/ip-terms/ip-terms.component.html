<app-public-page-hero slug="ip-terms" [defaultTitle]="pageTitle" [defaultBody]="pageBody" />

<div class="card-surface card-body mt-6">
  <p class="mb-4 text-sm text-muted-foreground">{{ lastUpdated }}</p>
  <ol class="flex flex-col gap-5">
    @for (section of sections; track section.heading) {
      <li>
        <h2 class="section-title">{{ section.heading }}</h2>
        <p class="mt-1 text-sm leading-relaxed text-foreground">{{ section.body }}</p>
      </li>
    }
  </ol>
  <p class="mt-6 border-t border-border pt-4 text-sm font-medium text-brand-teal">{{ agreementNote }}</p>
</div>
